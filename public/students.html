<!DOCTYPE html>
<html>
<head>
  <title>Students List</title>

  <style>
    body {
      font-family: Arial;
      background: #f4f6f8;
      margin: 0;
      padding: 20px;
    }

    h2 {
      text-align: center;
      color: #2c3e50;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: white;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
      border-radius: 10px;
      overflow: hidden;
    }

    th {
      background: #3498db;
      color: white;
      padding: 12px;
    }

    td {
      padding: 10px;
      text-align: center;
      border-bottom: 1px solid #ddd;
    }

    tr:hover {
      background: #f1f1f1;
    }

    .container {
      max-width: 900px;
      margin: auto;
    }
  </style>

</head>

<body>

<div class="container">

<h2>📋 Students List</h2>

<table>
  <tr>
    <th>ID</th>
    <th>Name</th>
    <th>Phone</th>
    <th>Course</th>
  </tr>

  <tbody id="data"></tbody>
</table>

</div>

<script>
fetch("/students")
.then(res => res.json())
.then(data => {

  let rows = "";

  data.forEach(s => {
    rows += `
      <tr>
        <td>${s.id}</td>
        <td>${s.name}</td>
        <td>${s.phone}</td>
        <td>${s.course}</td>
      </tr>
    `;
  });

  document.getElementById("data").innerHTML = rows;

});
</script>

</body>
</html>
