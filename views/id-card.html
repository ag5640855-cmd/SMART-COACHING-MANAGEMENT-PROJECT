<!DOCTYPE html>
<html>
<head>

<title>ID Card</title>

<style>

body{
    font-family:Arial;
    background:#f4f4f4;
    padding:20px;
}

table{
    width:100%;
    background:white;
    border-collapse:collapse;
}

th,td{
    border:1px solid #ddd;
    padding:10px;
}

button{
    padding:5px 12px;
}

</style>

</head>

<body>

<h2>Student ID Cards</h2>

<table>

<thead>

<tr>
<th>ID</th>
<th>Name</th>
<th>Class</th>
<th>Mobile</th>
<th>Action</th>
</tr>

</thead>

<tbody id="studentData">

</tbody>

</table>

<script>

async function loadStudents(){

    const res =
    await fetch("/students-list");

    const data =
    await res.json();

    let html="";

    data.forEach(st=>{

        html += `
        <tr>
            <td>${st.id}</td>
            <td>${st.name}</td>
            <td>${st.student_class}</td>
            <td>${st.phone}</td>

            <td>

            <button onclick="viewCard(${st.id})">
            View ID
            </button>

            </td>
        </tr>
        `;

    });

    document.getElementById(
        "studentData"
    ).innerHTML = html;

}

function viewCard(id){

    window.open(
        "/certificate?id=" + id,
        "_blank"
    );

}

loadStudents();

</script>

</body>
</html>
