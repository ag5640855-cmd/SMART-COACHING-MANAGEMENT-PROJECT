<!DOCTYPE html>
<html>
<head>
    <title>Notice Board</title>

    <style>

        body{
            font-family: Arial, sans-serif;
            background:#f5f5f5;
            padding:20px;
        }

        .box{
            max-width:800px;
            margin:auto;
            background:white;
            padding:20px;
            border-radius:10px;
        }

        h1{
            text-align:center;
        }

        input, textarea{
            width:100%;
            padding:10px;
            margin-top:10px;
            margin-bottom:10px;
        }

        button{
            padding:10px 20px;
        }

        .notice{
            border:1px solid #ddd;
            margin-top:15px;
            padding:15px;
            border-radius:8px;
        }

    </style>

</head>

<body>

<div class="box">

    <h1>Notice Board</h1>

    <input type="text" id="title" placeholder="Notice Title">

    <textarea id="description" placeholder="Notice Description"></textarea>

    <button onclick="saveNotice()">Add Notice</button>

    <hr>

    <div id="noticeList"></div>

</div>

<script>

async function saveNotice(){

    const title =
    document.getElementById("title").value;

    const description =
    document.getElementById("description").value;

    if(title==="" || description===""){
        alert("Fill all fields");
        return;
    }

    const response = await fetch("/add-notice",{
        method:"POST",
        headers:{
            "Content-Type":"application/json"
        },
        body:JSON.stringify({
            title:title,
            description:description
        })
    });

    const data = await response.json();

    if(data.success){

        alert("Notice Added");

        document.getElementById("title").value="";
        document.getElementById("description").value="";

        loadNotices();

    }else{

        alert("Error");

    }

}

async function loadNotices(){

    const response =
    await fetch("/notice-data");

    const data =
    await response.json();

    let html = "";

    data.forEach(item=>{

        html += `
        <div class="notice">
            <h3>${item.title}</h3>
            <p>${item.description}</p>
        </div>
        `;

    });

    document.getElementById("noticeList").innerHTML = html;

}

loadNotices();

</script>

</body>
</html>
