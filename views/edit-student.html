<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Edit Student</title>

<style>

body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#f4f6f9;
}

.header{
    background:#2c3e50;
    color:white;
    text-align:center;
    padding:15px;
}

.container{
    width:90%;
    max-width:600px;
    margin:30px auto;
}

.card{
    background:white;
    padding:25px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
}

h2{
    text-align:center;
    color:#2c3e50;
}

.form-group{
    margin-bottom:15px;
}

label{
    display:block;
    margin-bottom:5px;
    font-weight:bold;
}

input{
    width:100%;
    padding:12px;
    border:1px solid #ccc;
    border-radius:5px;
    box-sizing:border-box;
}

button{
    width:100%;
    padding:12px;
    background:#3498db;
    color:white;
    border:none;
    border-radius:5px;
    cursor:pointer;
    font-size:16px;
}

button:hover{
    background:#2980b9;
}

</style>

</head>
<body>

<div class="header">
    <h1>Ankit Coaching Classes</h1>
</div>

<div class="container">

<div class="card">

<h2>Edit Student</h2>

<div class="form-group">
<label>Student ID</label>
<input
type="number"
id="studentId"
placeholder="Enter Student ID">
</div>

<div class="form-group">
<label>Full Name</label>
<input
type="text"
id="full_name"
placeholder="Enter Full Name">
</div>

<div class="form-group">
<label>Email</label>
<input
type="email"
id="email"
placeholder="Enter Email">
</div>

<div class="form-group">
<label>Phone</label>
<input
type="text"
id="phone"
placeholder="Enter Phone Number">
</div>

<div class="form-group">
<label>Class</label>
<input
type="text"
id="student_class"
placeholder="Enter Class">
</div>

<button onclick="updateStudent()">
Update Student
</button>

</div>

</div>

<script>

function updateStudent(){

    const id =
    document.getElementById("studentId").value;

    const full_name =
    document.getElementById("full_name").value;

    const email =
    document.getElementById("email").value;

    const phone =
    document.getElementById("phone").value;

    const student_class =
    document.getElementById("student_class").value;

    if(
        !id ||
        !full_name ||
        !email ||
        !phone ||
        !student_class
    ){
        alert("Please Fill All Fields");
        return;
    }

    fetch(`/update-student/${id}`, {

        method:"PUT",

        headers:{
            "Content-Type":"application/json"
        },

        body:JSON.stringify({
            full_name,
            email,
            phone,
            student_class
        })

    })

    .then(res => res.json())

    .then(data => {

        alert(data.message);

    })

    .catch(err => {

        console.log(err);
        alert("Update Failed");

    });

}

</script>

</body>
</html>
