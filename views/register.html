<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Registration</title>

<link rel="stylesheet" href="/css/register.css">

</head>
<body>
<style>
    body{
        background-color: red;
    }
</style>
<div class="container">

<h1>Ankit Coaching Classes</h1>

<h2>Student Registration</h2>

<form id="registerForm">

<input
type="text"
id="full_name"
placeholder="Full Name"
required>

<input
type="email"
id="email"
placeholder="Email"
required>

<input
type="text"
id="phone"
placeholder="Mobile Number"
required>

<select id="student_class">

<option value="">Select Class</option>

<option>1st</option>
<option>2nd</option>
<option>3rd</option>
<option>4th</option>
<option>5th</option>
<option>6th</option>
<option>7th</option>
<option>8th</option>
<option>9th</option>
<option>10th</option>

</select>

<input
type="password"
id="password"
placeholder="Password"
required>

<button type="submit">
Register
</button>

</form>

</div>

<script src="/js/register.js"></script>

</body>
</html>
