<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Student Registration</title>

    <link rel="stylesheet" href="/css/register.css">

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

</head>

<body>

    <div class="container">

        <div class="register-box">

            <h1>Ankit Coaching Classes</h1>

            <p>Create Student Account</p>

            <form id="registerForm">

                <div class="input-box">

                    <i class="fa-solid fa-user"></i>

                    <input
                        type="text"
                        id="full_name"
                        placeholder="Full Name"
                        required>

                </div>

                <div class="input-box">

                    <i class="fa-solid fa-envelope"></i>

                    <input
                        type="email"
                        id="email"
                        placeholder="Email Address"
                        required>

                </div>

                <div class="input-box">

                    <i class="fa-solid fa-phone"></i>

                    <input
                        type="text"
                        id="phone"
                        maxlength="10"
                        placeholder="Mobile Number"
                        required>

                </div>

                <div class="input-box">

                    <i class="fa-solid fa-graduation-cap"></i>

                    <select id="student_class" required>

                        <option value="">Select Class</option>

                        <option>1st</option>
                        <option>2nd</option>
                        <option>3rd</option>
                        <option>4th</option>
                        <option>5th</option>
                        <option>6th</option>
                        <option>7th</option>
                        <option>8th</option>
                        <option>9th</option>
                        <option>10th</option>
                        <option>11th</option>
                        <option>12th</option>

                    </select>

                </div>

                <div class="input-box">

                    <i class="fa-solid fa-lock"></i>

                    <input
                        type="password"
                        id="password"
                        placeholder="Password"
                        required>

                </div>

                <div class="input-box">

                    <i class="fa-solid fa-lock"></i>

                    <input
                        type="password"
                        id="confirm_password"
                        placeholder="Confirm Password"
                        required>

                </div>

                <button id="registerBtn" type="submit">

                    Register

                </button>

            </form>

            <div class="bottom-text">

                Already have an account?

                <a href="/student-login">

                    Login

                </a>

            </div>

        </div>

    </div>

    <script src="/js/register.js"></script>

</body>

</html>
