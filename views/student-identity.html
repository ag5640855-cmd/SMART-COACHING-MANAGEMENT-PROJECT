<!DOCTYPE html>
<html>
<head>

<title>Student Identity</title>

<style>

body{
font-family:Arial;
background:#f5f5f5;
padding:20px;
}

table{
width:100%;
background:white;
border-collapse:collapse;
}

th,td{
border:1px solid #ddd;
padding:10px;
text-align:center;
}

button{
padding:8px 15px;
cursor:pointer;
}

</style>

</head>

<body>

<h2>Student Identity Cards</h2>

<table>

<thead>

<tr>

<th>ID</th>
<th>Name</th>
<th>Class</th>
<th>Mobile</th>
<th>Action</th>

</tr>

</thead>

<tbody id="studentData"></tbody>

</table>

<script>

async function loadStudents(){

const res =
await fetch("/students-list");

const data =
await res.json();

let html = "";

data.forEach(st=>{

html += `
<tr>

<td>${st.id}</td>

<td>${st.name}</td>

<td>${st.student_class}</td>

<td>${st.phone}</td>

<td>

<button
onclick="viewCard(${st.id})">

View Card

</button>

</td>

</tr>
`;

});

document.getElementById(
"studentData"
).innerHTML = html;

}

function viewCard(id){

window.open(
"/student-identity-view?id="+id,
"_blank"
);

}

loadStudents();

</script>

</body>
</html>
