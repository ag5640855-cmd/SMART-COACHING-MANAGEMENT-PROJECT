<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0">

    <title>Student Login</title>

    <link
    rel="stylesheet"
    href="/css/login.css">

</head>

<body>

    <div class="login-container">

        <h1>
            Ankit Coaching Classes
        </h1>

        <p>
            Student Login Portal
        </p>

        <form id="loginForm">

            <div class="form-group">

                <label>Email</label>

                <input
                type="email"
                id="email"
                placeholder="Enter Email"
                required>

            </div>

            <div class="form-group">

                <label>Password</label>

                <input
                type="password"
                id="password"
                placeholder="Enter Password"
                required>

            </div>

            <button type="submit">
                Login
            </button>

        </form>

    </div>

    <script src="/js/login.js"></script>

</body>

</html>
