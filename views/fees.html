<!DOCTYPE html>
<html>
<head>
    <title>Fees Management</title>
</head>
<style>
    body{
        margin:0;
        font-family:Arial;
        background:#8cacdc;
        align-items:center;
        justify-content: center;

    }
    h2{
        color:white;
        text-align:center;
        border-bottom:2px solid white;
        padding: 40px 0;
    }
    form{
        background:white;
        padding:30px;
        border-radius:10px;
        box-shadow:0 0 15px rgba(0,0,0,0.2);
        width:300px;
        text-align:center;
        margin: 30px auto;
        padding: 20px 
        ;

    }
    input{
        width:100%;
        padding:12px;
        margin-top:10px;
        border:1px solid #ccc;
        border-radius:5px;
        box-sizing:border-box;
    }
    button{
        width:100%;
        padding:12px;
        margin-top:15px;
        background:#3498db;
        color:white;
        border:none;
        border-radius:5px;
        cursor:pointer;
    }
</style>


<body>

<h2>Student Fees</h2>

<form id="feesForm">

    <input type="number"
           id="student_id"
           placeholder="Student ID"
           required>

    <input type="number"
           id="amount"
           placeholder="Amount"
           required>

           <div style="text-align:center;margin-top:20px;">

    <h3>Scan & Pay Fees</h3>

    <img
    src="/uploads/payment-qr.png"
    width="250"
    style="border-radius:10px;">

    <p>
        Scan QR and pay fees
    </p>

</div>

<input
type="text"
id="utr"
placeholder="Enter UTR Number"
required>

    <button type="submit">
        Save Fees
    </button>

</form>

<script>

document
.getElementById("feesForm")
.addEventListener("submit", async function(e){

    e.preventDefault();

    const student_id =
        document.getElementById("student_id").value;

    const amount =
        document.getElementById("amount").value;

        const utr =
        document.getElementById("utr").value;

    const response =
        await fetch("/save-fees", {

            method: "POST",

            headers: {
                "Content-Type":
                "application/json"
            },

            body: JSON.stringify({
                student_id,
                amount,
                utr
            })

        });

    const data =
        await response.json();

    alert(data.message);

});

</script>

</body>
</html>
