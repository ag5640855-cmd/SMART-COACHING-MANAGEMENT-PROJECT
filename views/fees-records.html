<!DOCTYPE html>
<html>
<head>
    <title>Fees Records</title>

    <style>

        body{
            font-family:Arial;
            background:#f4f4f4;
        }

        h2{
            text-align:center;
        }

        table{
            width:90%;
            margin:auto;
            border-collapse:collapse;
            background:white;
        }

        th{
            background:#28a745;
            color:white;
            padding:10px;
        }

        td{
            border:1px solid #ddd;
            padding:10px;
            text-align:center;
        }

    </style>

</head>
<body>

<h2>Fees Records</h2>

<table>

<tr>
    <th>ID</th>
    <th>Student ID</th>
    <th>Amount</th>
    <th>Payment Date</th>
    <th>Status</th>
</tr>

<tbody id="feesData">

</tbody>

</table>

<script>

fetch("/fees-data")
.then(res => res.json())
.then(data => {

    let rows = "";

    data.forEach(item => {

        rows += `
        <tr>
            <td>${item.id}</td>
            <td>${item.student_id}</td>
            <td>${item.amount}</td>
            <td>${new Date(item.payment_date).toLocaleDateString()}</td>
            <td>${item.status}</td>
        </tr>
        `;

    });

    document.getElementById("feesData").innerHTML = rows;

});

</script>

</body>
</html>
