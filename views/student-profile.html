<!DOCTYPE html>
<html>
<head>

<title>Student Profile</title>

<style>

body{
    font-family:Arial;
    background:#f4f4f4;
    margin:0;
}

.header{
    background:#2c3e50;
    color:white;
    text-align:center;
    padding:15px;
}

.container{
    width:80%;
    margin:30px auto;
}

.card{
    background:white;
    padding:20px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
}

input{
    width:70%;
    padding:10px;
}

button{
    padding:10px 20px;
    cursor:pointer;
}

.result{
    margin-top:20px;
}

.result p{
    background:#f8f9fa;
    padding:10px;
    border-radius:5px;
}

</style>

</head>

<body>

<div class="header">
    <h1>Ankit Coaching Classes</h1>
</div>

<div class="container">

<div class="card">

<h2>Student Profile</h2>

<input
type="number"
id="studentId"
placeholder="Enter Student ID">

<button onclick="searchProfile()">
Search
</button>

<div id="result" class="result">

</div>

</div>

</div>

<script>

function searchProfile(){

    const id =
    document.getElementById("studentId").value;

    if(!id){

        alert("Enter Student ID");
        return;
    }

    fetch(`/student-profile-data/${id}`)
    .then(response => response.json())
    .then(data => {

        if(!data.success){

            document.getElementById("result")
            .innerHTML =
            `<p>${data.message}</p>`;

            return;
        }

        const student =
        data.student;

        document.getElementById("result")
        .innerHTML = `

        <p><b>ID:</b> ${student.id}</p>

        <p><b>Name:</b> ${student.name}</p>

        <p><b>Email:</b> ${student.email}</p>

        <p><b>Total Attendance:</b>
        ${student.total_attendance}</p>

        `;
    })
    .catch(err => {

        console.log(err);

        document.getElementById("result")
        .innerHTML =
        `<p>Error Loading Profile</p>`;

    });

}

</script>

</body>
</html>
